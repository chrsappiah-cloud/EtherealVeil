name: CI

on:
  push:
    branches: [master, main, "feature/**", "fix/**"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  # ── SPM Unit Tests (fast, no simulator) ──────────────────────────────────
  spm-test:
    name: SPM Unit Tests (macOS)
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app
      - name: Resolve dependencies
        run: swift package resolve
      - name: Build
        run: swift build --configuration debug
      - name: Run tests
        run: swift test --configuration debug --parallel
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spm-test-results
          path: .build/
          retention-days: 7

  # ── Xcode Build + Full Test Suite ────────────────────────────────────────
  xcode-test:
    name: Xcode Build & Test (iOS Simulator)
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project EtherealVeil/EtherealVeil.xcodeproj \
            -scheme EtherealVeilTests \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.4" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -project EtherealVeil/EtherealVeil.xcodeproj \
            -scheme EtherealVeilTests \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.4" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          retention-days: 14
