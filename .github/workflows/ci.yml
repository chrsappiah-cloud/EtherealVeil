name: CI

on:
  push:
    branches: [master, main, "feature/**", "fix/**"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  # ── Build & Test (Swift Package Manager) ─────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: macos-15
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build --configuration debug 2>&1 | xcpretty || swift build --configuration debug

      - name: Run tests
        run: |
          swift test \
            --configuration debug \
            --parallel \
            2>&1 | xcpretty || swift test --configuration debug --parallel

      - name: Install xcpretty for artifact formatting
        if: always()
        run: gem install xcpretty --quiet || true

      - name: Archive test results
        if: always()
        run: |
          mkdir -p test-results
          swift test --configuration debug 2>&1 | tee test-results/output.txt || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
