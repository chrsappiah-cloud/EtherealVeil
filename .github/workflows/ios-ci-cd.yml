name: iOS CI/CD

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Make preflight executable
        run: |
          chmod +x scripts/release_preflight.sh

      - name: Preflight (unit tests + release build)
        run: |
          PROJECT_PATH="$GITHUB_WORKSPACE/EtherealVeil.xcodeproj" \
          TEST_SCOPE="unit" \
          DERIVED_DATA="$RUNNER_TEMP/DerivedData-Preflight" \
          bash scripts/release_preflight.sh

  cd:
    name: Release Archive Artifact
    runs-on: macos-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Archive (unsigned)
        run: |
          xcodebuild \
            -project "EtherealVeil.xcodeproj" \
            -scheme "EtherealVeil" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/EtherealVeil.xcarchive" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: etherealveil-release-archive
          path: ${{ runner.temp }}/EtherealVeil.xcarchive
