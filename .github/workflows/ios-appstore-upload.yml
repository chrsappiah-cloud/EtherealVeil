name: iOS App Store Upload

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (for release notes/reference)"
        required: true
      build_number:
        description: "Build number (CFBundleVersion)"
        required: true
  push:
    tags:
      - "v*"

jobs:
  upload:
    name: Build, Sign, Export, Upload
    runs-on: macos-latest

    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
      IOS_CERT_P12_PASSWORD: ${{ secrets.IOS_CERT_P12_PASSWORD }}
      IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          for key in \
            ASC_KEY_ID ASC_ISSUER_ID ASC_API_KEY_P8_BASE64 APPLE_TEAM_ID \
            IOS_CERT_P12_BASE64 IOS_CERT_P12_PASSWORD IOS_PROFILE_BASE64 KEYCHAIN_PASSWORD
          do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

      - name: Set build number and version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version }}" "EtherealVeil/Info.plist" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.event.inputs.build_number }}" "EtherealVeil/Info.plist" || true
          fi

      - name: Install distribution certificate and provisioning profile
        run: |
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$IOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERT_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Prepare App Store Connect API key
        run: |
          mkdir -p "$HOME/private_keys"
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Archive signed build
        run: |
          xcodebuild \
            -project "EtherealVeil.xcodeproj" \
            -scheme "EtherealVeil" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/EtherealVeil.xcarchive" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -allowProvisioningUpdates \
            -archivePath "$RUNNER_TEMP/EtherealVeil.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            -f "$RUNNER_TEMP/export/EtherealVeil.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: etherealveil-appstore-upload-artifacts
          path: |
            ${{ runner.temp }}/EtherealVeil.xcarchive
            ${{ runner.temp }}/export
